<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Recorrido GPS</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; }
        .controls { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        button { padding: 15px; font-size: 16px; cursor: pointer; border: none; border-radius: 5px; color: white; }
        .btn-start { background-color: #28a745; }
        .btn-stop { background-color: #dc3545; }
        .btn-export { background-color: #007bff; }
        #estado { font-weight: bold; margin: 10px 0; }
    </style>
</head>
<body>

    <h1>Gestor de Recorrido</h1>
    <div id="estado">Estado: Esperando inicio...</div>

    <div class="controls">
        <button class="btn-start" onclick="iniciar()">Iniciar Recorrido</button>
        <button class="btn-stop" onclick="terminar()">Terminar Recorrido</button>
        <button class="btn-export" onclick="exportarExcel()">Exportar a Excel</button>
    </div>

    <canvas id="graficaSemanal"></canvas>

    <script>
        let startPos = null;
        let historial = JSON.parse(localStorage.getItem('recorridos')) || [];

        function calcularDistancia(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function iniciar() {
            navigator.geolocation.getCurrentPosition(pos => {
                startPos = { lat: pos.coords.latitude, lon: pos.coords.longitude };
                document.getElementById('estado').innerText = "Estado: Recorrido en curso...";
            });
        }

        function terminar() {
            if (!startPos) return alert("Primero inicia el recorrido");
            navigator.geolocation.getCurrentPosition(pos => {
                const dist = calcularDistancia(startPos.lat, startPos.lon, pos.coords.latitude, pos.coords.longitude);
                const nuevoRegistro = { fecha: new Date().toLocaleDateString(), km: dist.toFixed(2) };
                historial.push(nuevoRegistro);
                localStorage.setItem('recorridos', JSON.stringify(historial));
                document.getElementById('estado').innerText = "Estado: Recorrido guardado (" + dist.toFixed(2) + " km)";
                renderizarGrafica();
            });
        }

        function exportarExcel() {
            let csv = "Fecha,Distancia(km)\n" + historial.map(r => `${r.fecha},${r.km}`).join("\n");
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'recorridos.csv'; a.click();
        }

        function renderizarGrafica() {
            const ctx = document.getElementById('graficaSemanal').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: { labels: historial.map(r => r.fecha), datasets: [{ label: 'KM recorridos', data: historial.map(r => r.km), borderColor: '#007bff' }] }
            });
        }
        
        renderizarGrafica();
    </script>
</body>
</html>
