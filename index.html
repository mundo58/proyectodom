<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Recorrido GPS</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; }
        .controls { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        button { padding: 15px; font-size: 16px; cursor: pointer; border: none; border-radius: 5px; color: white; }
        .btn-start { background-color: #28a745; }
        .btn-stop { background-color: #dc3545; }
        .btn-export { background-color: #007bff; }
        #estado { font-weight: bold; margin: 10px 0; }
    </style>
</head>
<body>

    <h1>Gestor de Recorrido</h1>
    <div id="estado">Estado: Esperando inicio...</div>

    <div class="controls">
        <button class="btn-start" onclick="iniciar()">Iniciar Recorrido</button>
        <button class="btn-stop" onclick="terminar()">Terminar Recorrido</button>
        <button class="btn-export" onclick="exportarExcel()">Exportar Datos (CSV)</button>
    </div>

    <canvas id="graficaSemanal"></canvas>

    <script>
        let startPos = null;
        let historial = JSON.parse(localStorage.getItem('recorridos')) || [];

        function iniciar() {
            navigator.geolocation.getCurrentPosition(pos => {
                startPos = { 
                    lat: pos.coords.latitude, 
                    lon: pos.coords.longitude,
                    timestamp: new Date().toLocaleString()
                };
                document.getElementById('estado').innerText = "Estado: Recorrido en curso...";
            });
        }

        function terminar() {
            if (!startPos) return alert("Primero inicia el recorrido");
            navigator.geolocation.getCurrentPosition(pos => {
                const endPos = { lat: pos.coords.latitude, lon: pos.coords.longitude };
                const nuevoRegistro = { 
                    fecha: new Date().toLocaleDateString(),
                    hora: new Date().toLocaleTimeString(),
                    inicio: `${startPos.lat}, ${startPos.lon}`,
                    fin: `${endPos.lat}, ${endPos.lon}`
                };
                historial.push(nuevoRegistro);
                localStorage.setItem('recorridos', JSON.stringify(historial));
                document.getElementById('estado').innerText = "Estado: Recorrido guardado exitosamente";
            });
        }

        function exportarExcel() {
            let csv = "Fecha,Hora,Coordenadas Inicio,Coordenadas Fin\n" + 
                      historial.map(r => `${r.fecha},${r.hora},"${r.inicio}","${r.fin}"`).join("\n");
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'coordenadas_recorrido.csv'; a.click();
        }
    </script>
</body>
</html>
